<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS-welcome-page</title>
    <style>
        body{
            background-color: grey;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        main{
            position: fixed;
            top: 10%;
            width: 90%;
            height: 80%;
            background-color: rgb(12, 152, 152);
            border-radius: 10px;
             display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .welcome_info{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        .buttons{
            padding-top: 10%;
            /* display: flex; */
            /* flex-direction: row; */
            width: 80%;
            justify-content: space-around;
            /* align-items: center; */
        }
        /* .buttons #signup_btn{
            padding: 10%;
            color: white;
            background-color: blue;
            border: none;
            border-radius: 5px;
            width: 200%;
            height: 200%;
            transition: .3s all;
        } */
        /* .buttons #signup_btn:hover{
            background-color: rgb(38, 38, 181);
            transform: translateX(-5px);
        } */
        .buttons #login_btn{
            padding: 10%;
            color: white;
            background-color: green;
            border: none;
            border-radius: 5px;
            width: 100%;
            transition: .3s all;
            height: 80%;
        }
        .buttons #login_btn:hover{
            background-color: rgb(21, 227, 21);
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <main>
        <div class="welcome_info">
            <p>Welcome to <b>EMS</b> a platform built to connect employees to employers
            <b>Built by Sekate Amon AKA Jeff Amons Croft</b></p>
        </div>
        <div class="buttons">
            <a href="{% url 'login' %}"><button id="login_btn">Log In</button></a>
        </div>
    </main>
    
</body>
</html>

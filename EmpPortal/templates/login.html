<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS-login</title>
    <style>
        body{
            background-color: grey;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        main{
            position: fixed;
            top: 10%;
            width: 95%;
            height: 80%;
            background-color: rgb(12, 152, 152);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: x-large;
        }
        main input{
            border:  none;
            border-radius: 5px;
            height: 40px;
            text-align: center;
            font-size: large;
        }
        .email{
            display:  flex;
            flex-direction: column;
            padding: 20px;
        }
        .password{
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .buttons{
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }
        .buttons button{
            font-size: large;
            width: 90%;
            height: 50px;
            background-color: green;
            border: none;
            border-radius: 10px;
            color: white;
            transition: .3s all;
        }
        .buttons button:hover{
            background-color: rgb(7, 181, 123);
            transform: translateX(10px);
        }
        .messages{
            color: red;
        }
        
    </style>
</head>
<body>
    <main>
        <h1>Log In</h1>
        <form action="" method="POST">
            {% csrf_token %}
        <div class="email">
            <label for="">Email</label>
            <input name="email" type="email">
        </div>
        <div class="password">
            <label for="">Emp ID:</label>
            <input name="emp_id" type="text">
        </div>
        <div class="buttons">
            <button type="submit">Log In</button>
        </div>
        </form>
        <div class="messages">
        {% if messages %}
        {% for message in messages %}
        {{ message }}
        {% endfor %}
        {% endif %}
        </div>
    </main>
    
</body>
</html>
